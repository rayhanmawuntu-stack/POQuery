name: Deploy PO Query to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Prepare static site
        run: |
          mkdir -p _site
          cp index.html styles.css app.js gr-date.js item-timeline.js sap-controls.js _site/
          printf '\n' >> _site/item-timeline.js
          cat description-copy.js >> _site/item-timeline.js
          printf '\n' >> _site/item-timeline.js
          cat source-panel.js >> _site/item-timeline.js
          printf '\n' >> _site/item-timeline.js
          cat print-logo.js >> _site/item-timeline.js
          printf '\n' >> _site/item-timeline.js
          cat item-description-search.js >> _site/item-timeline.js
          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
